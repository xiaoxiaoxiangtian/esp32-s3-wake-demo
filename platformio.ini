[env:esp32-s3-n16R8-wake-demo]
platform = espressif32
#board = esp32-s3-devkitc-1
board = 4d_systems_esp32s3_gen4_r8n16
board_build.flash_size = 16MB
board_build.psram_type = opi
framework = espidf
board_build.partitions = partitions.csv
board_build.flash_mode = qio
board_build.filesystem = spiffs
board_build.esp_idf_component_manager = yes
monitor_speed = 115200
upload_port = COM3

board_build.extra_components_dirs =
    ../esp-sr-v2.0

build_flags =
    -DI2S_MIC_WS=4
    -DI2S_MIC_SCK=5
    -DI2S_MIC_SD=6
    -DTFT_MOSI=47
    -DTFT_SCLK=21
    -DTFT_CS=41
    -DTFT_DC=40
    -DTFT_RST=45
    -DTFT_BL=42
